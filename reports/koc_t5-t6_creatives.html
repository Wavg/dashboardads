     <td class="num">${vnd(c.spend)}</td><td class="num b">${big(c.mua)}</td><td class="num">${c.mua?vnd(c.cpa):"—"}</td><td class="num">${pc(c.ctr)}</td></tr>`;
 }).join("");
 return `<div class="koc"><h3><span>${k.koc} <span class="meta">· ${k.n} creative</span></span>
   <span class="meta">chi <b>${vnd(k.spend)}</b> · <b>${big(k.mua)}</b> mua · CPA <b>${vnd(cpa)}</b></span></h3>
   <table><thead><tr><th>Tuyến</th><th>Creative</th><th>Chi tiêu</th><th>Mua</th><th>CPA</th><th>CTR</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}).join("");
</script></body></html>
